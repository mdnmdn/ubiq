    frame: checkout

  - line: { id: sd2, start: [694, 314], end: [976, 314], stroke: "#e9ecef" }
    frame: checkout

  # Promo code
  - rect: in_promo
    at: [694, 330]
    size: [196, 40]
    bg: "#f8f9fa"
    stroke: "#ced4da"
    roundness: true
    frame: checkout
  - text: "Promo code"
    id: ph_promo
    at: [710, 341]
    fontSize: 13
    align: left
    stroke: "#adb5bd"
    frame: checkout
  - rect: btn_apply
