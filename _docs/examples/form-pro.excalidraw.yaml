# Checkout / Billing page wireframe — "super" form in the simple Excalidraw format.
# Two-column layout: main form (contact, shipping, payment) + order-summary sidebar card.
# Render:  uv run _tools/excalidraw.py to-image -i _docs/examples/form-pro.excalidraw.yaml -o /tmp/form-pro.png --scale 2
# Convert: uv run _tools/excalidraw.py to-excalidraw -i _docs/examples/form-pro.excalidraw.yaml -o /tmp/form-pro.excalidraw
version: 1

canvas:
  background: "#f1f3f5"
  theme: light

# Explicit coordinates — forms need precise alignment.
layout:
  mode: none

defaults:
  roughness: 0          # clean, UI-mockup look
  strokeWidth: thin
  fontFamily: normal

# Palette
#   accent   #4263eb (primary)   accent-dark #364fc7
#   ink      #212529  label #495057  muted #868e96  placeholder #adb5bd
#   border   #dee2e6  field-bg #f8f9fa  card #ffffff

elements:
  # ============================================================ FRAME
  - frame: checkout
    at: [20, 20]
    size: [1000, 880]
    name: "Checkout — Wireframe"

  # ============================================================ HEADER BAR
  - rect: header
    at: [40, 36]
    size: [960, 64]
    bg: "#ffffff"
    stroke: "#dee2e6"
    roundness: true
    frame: checkout
  - text: "◆  Acme Store"
    id: brand
    at: [64, 56]
    fontSize: 22
    stroke: "#212529"
    frame: checkout
  - text: "Step 2 of 3 — Payment & Shipping"
    id: stepinfo
    at: [300, 62]
    fontSize: 14
    align: left
    stroke: "#868e96"
    frame: checkout
  - text: "🔒 Secure checkout"
    id: secure
    at: [820, 62]
    fontSize: 13
    align: left
    stroke: "#2f9e44"
    frame: checkout

  # ============================================================ MAIN FORM CARD (left column)
  - rect: form_card
    at: [40, 120]
    size: [610, 760]
    bg: "#ffffff"
    stroke: "#dee2e6"
    roundness: true
    frame: checkout

  # ------------------------------------------------ SECTION 1: Contact
  - text: "1  Contact information"
    id: s1
    at: [68, 144]
    fontSize: 18
    stroke: "#212529"
    frame: checkout
  - line: { id: d1, start: [68, 178], end: [622, 178], stroke: "#e9ecef" }
    frame: checkout

  - text: "Email address"
    id: lbl_email
    at: [68, 194]
    fontSize: 13
    stroke: "#495057"
    frame: checkout
  - rect: in_email
    at: [68, 214]
    size: [554, 42]
    bg: "#f8f9fa"
    stroke: "#ced4da"
    roundness: true
    frame: checkout
  - text: "jane.doe@example.com"
    id: ph_email
    at: [84, 226]
    fontSize: 14
    align: left
    stroke: "#adb5bd"
    frame: checkout

  - rect: chk_news
    at: [68, 270]
    size: [18, 18]
    bg: "#4263eb"
    stroke: "#4263eb"
    roundness: false
    frame: checkout
  - text: "✓"
    id: chk_news_tick
    at: [70, 269]
    fontSize: 14
    align: left
    stroke: "#ffffff"
    frame: checkout
  - text: "Email me with news and offers"
    id: news_lbl
    at: [96, 271]
    fontSize: 13
    align: left
    stroke: "#495057"
    frame: checkout

  # ------------------------------------------------ SECTION 2: Shipping
  - text: "2  Shipping address"
    id: s2
    at: [68, 314]
    fontSize: 18
    stroke: "#212529"
    frame: checkout
  - line: { id: d2, start: [68, 348], end: [622, 348], stroke: "#e9ecef" }
    frame: checkout

  # Row: First / Last name
  - text: "First name"
    id: lbl_fn
    at: [68, 364]
    fontSize: 13
    stroke: "#495057"
    frame: checkout
  - rect: in_fn
    at: [68, 384]
    size: [268, 42]
    bg: "#f8f9fa"
    stroke: "#ced4da"
    roundness: true
    frame: checkout
  - text: "Jane"
    id: ph_fn
    at: [84, 396]
    fontSize: 14
    align: left
    stroke: "#adb5bd"
    frame: checkout

  - text: "Last name"
    id: lbl_ln
    at: [354, 364]
    fontSize: 13
    stroke: "#495057"
    frame: checkout
  - rect: in_ln
    at: [354, 384]
    size: [268, 42]
    bg: "#f8f9fa"
    stroke: "#ced4da"
    roundness: true
    frame: checkout
  - text: "Doe"
    id: ph_ln
    at: [370, 396]
    fontSize: 14
    align: left
    stroke: "#adb5bd"
    frame: checkout

  # Street address (full width)
  - text: "Street address"
    id: lbl_addr
    at: [68, 438]
    fontSize: 13
    stroke: "#495057"
    frame: checkout
  - rect: in_addr
    at: [68, 458]
    size: [554, 42]
    bg: "#f8f9fa"
    stroke: "#ced4da"
    roundness: true
    frame: checkout
  - text: "123 Market Street, Apt 4B"
