  - text: "Card number"
    id: lbl_card
    at: [68, 710]
    fontSize: 13
    stroke: "#495057"
    frame: checkout
  - rect: in_card
    at: [68, 730]
    size: [554, 42]
    bg: "#f8f9fa"
    stroke: "#ced4da"
    roundness: true
    frame: checkout
  - text: "1234  5678  9012  3456"
    id: ph_card
    at: [84, 742]
    fontSize: 14
    align: left
    stroke: "#adb5bd"
    frame: checkout
  - text: "VISA"
    id: card_brand
    at: [574, 742]
    fontSize: 13
    align: left
    stroke: "#4263eb"
    frame: checkout

  - text: "Expiry  /  CVC"
    id: lbl_exp
    at: [68, 786]
    fontSize: 13
    stroke: "#495057"
    frame: checkout
  - rect: in_exp
    at: [68, 806]
    size: [268, 42]
    bg: "#f8f9fa"
    stroke: "#ced4da"
    roundness: true
    frame: checkout
  - text: "MM / YY"
    id: ph_exp
    at: [84, 818]
    fontSize: 14
    align: left
    stroke: "#adb5bd"
    frame: checkout
  - rect: in_cvc
    at: [354, 806]
    size: [268, 42]
    bg: "#f8f9fa"
    stroke: "#ced4da"
    roundness: true
    frame: checkout
  - text: "CVC"
    id: ph_cvc
    at: [370, 818]
    fontSize: 14
    align: left
    stroke: "#adb5bd"
    frame: checkout

  # ============================================================ ORDER SUMMARY (right sidebar)
  - rect: side_card
    at: [670, 120]
    size: [330, 480]
    bg: "#ffffff"
    stroke: "#dee2e6"
    roundness: true
    frame: checkout
  - text: "Order summary"
    id: side_title
    at: [694, 144]
    fontSize: 18
    stroke: "#212529"
    frame: checkout
  - line: { id: sd1, start: [694, 178], end: [976, 178], stroke: "#e9ecef" }
    frame: checkout

  # Line item 1
  - rect: li1_img
    at: [694, 196]
    size: [44, 44]
    bg: "#edf2ff"
    stroke: "#dee2e6"
    roundness: true
    frame: checkout
  - text: "Aurora Headphones"
    id: li1_name
    at: [750, 198]
    fontSize: 14
    align: left
    stroke: "#212529"
    frame: checkout
  - text: "Qty 1 · Midnight"
    id: li1_meta
    at: [750, 218]
    fontSize: 12
    align: left
    stroke: "#868e96"
    frame: checkout
  - text: "$199.00"
    id: li1_price
