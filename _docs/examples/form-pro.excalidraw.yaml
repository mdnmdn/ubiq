    frame: checkout
  - text: "$12.00"
    id: rad_exp_price
    at: [580, 613]
    fontSize: 13
    align: left
    stroke: "#495057"
    frame: checkout

  # ------------------------------------------------ SECTION 3: Payment
  - text: "3  Payment"
    id: s3
    at: [68, 660]
    fontSize: 18
    stroke: "#212529"
    frame: checkout
  - line: { id: d3, start: [68, 694], end: [622, 694], stroke: "#e9ecef" }
