    size: [174, 42]
    bg: "#f8f9fa"
    stroke: "#ced4da"
    roundness: true
    frame: checkout
  - text: "San Francisco"
    id: ph_city
    at: [84, 544]
    fontSize: 14
    align: left
    stroke: "#adb5bd"
    frame: checkout

  - text: "Country"
    id: lbl_country
    at: [260, 512]
    fontSize: 13
    stroke: "#495057"
    frame: checkout
  - rect: in_country
    at: [260, 532]
    size: [190, 42]
    bg: "#f8f9fa"
    stroke: "#ced4da"
    roundness: true
    frame: checkout
  - text: "United States"
    id: ph_country
    at: [276, 544]
    fontSize: 14
    align: left
    stroke: "#495057"
    frame: checkout
  - text: "▾"
    id: country_caret
    at: [424, 543]
    fontSize: 16
    align: left
    stroke: "#868e96"
    frame: checkout

  - text: "ZIP"
    id: lbl_zip
    at: [468, 512]
    fontSize: 13
    stroke: "#495057"
    frame: checkout
  - rect: in_zip
    at: [468, 532]
    size: [154, 42]
    bg: "#f8f9fa"
    stroke: "#ced4da"
    roundness: true
    frame: checkout
  - text: "94103"
    id: ph_zip
    at: [484, 544]
    fontSize: 14
    align: left
    stroke: "#adb5bd"
    frame: checkout

  # Shipping method — radio group
  - text: "Shipping method"
    id: lbl_ship
    at: [68, 588]
    fontSize: 13
    stroke: "#495057"
    frame: checkout

  - ellipse: rad_std
    at: [68, 612]
    size: [18, 18]
    bg: "#ffffff"
    stroke: "#4263eb"
    frame: checkout
  - ellipse: rad_std_dot
    at: [72, 616]
    size: [10, 10]
    bg: "#4263eb"
    stroke: "#4263eb"
    frame: checkout
  - text: "Standard · 5–7 days"
    id: rad_std_lbl
    at: [96, 613]
    fontSize: 13
    align: left
    stroke: "#212529"
    frame: checkout
  - text: "Free"
    id: rad_std_price
    at: [300, 613]
    fontSize: 13
    align: left
    stroke: "#2f9e44"
    frame: checkout

  - ellipse: rad_exp
    at: [360, 612]
    size: [18, 18]
    bg: "#ffffff"
    stroke: "#ced4da"
    frame: checkout
  - text: "Express · 1–2 days"
    id: rad_exp_lbl
    at: [388, 613]
    fontSize: 13
    align: left
