    id: brand
    at: [64, 92]
    fontSize: 20
    align: left
    stroke: "#ffffff"
  - text: "harness multiplexer"
    id: tagline
    at: [64, 119]
    fontSize: 11
    align: left
    stroke: "#565f89"

  - rect: { id: btn_add, at: [60, 150], size: [200, 42], bg: "#4263eb", stroke: "#4263eb", roundness: true, text: "＋  Add session", textColor: "#ffffff", fontSize: 14 }

  - text: "SESSIONS"
    id: sess_hdr
    at: [64, 214]
    fontSize: 11
    align: left
    stroke: "#565f89"

  - text: "backend-refactor"
    id: s1n
    at: [76, 244]
    fontSize: 14
    align: left
    stroke: "#c0caf5"
  - text: "claude · 3 agents"
    id: s1m
    at: [76, 265]
    fontSize: 11
    align: left
    stroke: "#565f89"

  - text: "frontend-redesign"
    id: s2n
    at: [76, 306]
    fontSize: 14
    align: left
    stroke: "#c0caf5"
  - text: "opencode · 1 agent"
    id: s2m
    at: [76, 327]
    fontSize: 11
    align: left
    stroke: "#565f89"

  - text: "infra-migration"
    id: s3n
    at: [76, 362]
    fontSize: 14
    align: left
    stroke: "#c0caf5"
  - text: "codex · idle"
    id: s3m
    at: [76, 383]
    fontSize: 11
    align: left
    stroke: "#565f89"

  # Settings highlighted as the active destination
  - line: { id: sb_div, start: [56, 800], end: [264, 800], stroke: "#2a2e42" }
  - rect: { id: settings_active, at: [56, 808], size: [208, 36], bg: "#24283b", stroke: "#24283b", roundness: true }
  - rect: { id: settings_bar, at: [56, 808], size: [4, 36], bg: "#4263eb", stroke: "#4263eb" }
  - text: "⚙  Settings"
    id: settings_item
    at: [76, 819]
    fontSize: 14
    align: left
    stroke: "#ffffff"

