# Ubiq — Screen 4: Settings page (reached from the sidebar "⚙ Settings")
# Left: always-visible sidebar (Settings highlighted as active).
# Main: settings sub-nav (left) + content panel (right) showing the Agents section,
#       i.e. the agent types loaded from src-tauri/agents.toml with enable toggles.
# Render:  uv run _tools/excalidraw.py to-image -i 04-settings.excalidraw.yaml -o 04-settings.png --scale 2
version: 1

canvas:
  background: "#f1f3f5"
  theme: light

layout:
  mode: none

defaults:
  roughness: 0
  strokeWidth: thin
  fontFamily: normal

elements:
  # =================================================== WINDOW CHROME
  - rect: { id: win, at: [20, 20], size: [1320, 840], bg: "#f1f3f5", stroke: "#ced4da", roundness: true }
  - rect: { id: titlebar, at: [20, 20], size: [1320, 40], bg: "#e9ecef", stroke: "#ced4da", roundness: true }
  - ellipse: { id: tl_r, at: [40, 34], size: [12, 12], bg: "#fa5252", stroke: "#fa5252" }
  - ellipse: { id: tl_y, at: [58, 34], size: [12, 12], bg: "#fab005", stroke: "#fab005" }
  - ellipse: { id: tl_g, at: [76, 34], size: [12, 12], bg: "#40c057", stroke: "#40c057" }
  - text: "● Ubiq   —   Settings"
    id: wintitle
    at: [600, 31]
    fontSize: 13
    align: left
    stroke: "#495057"

  # =================================================== SIDEBAR (always visible)
