    at: [64, 214]
    fontSize: 11
    align: left
    stroke: "#565f89"

  - rect: { id: sess1, at: [56, 234], size: [208, 54], bg: "#24283b", stroke: "#24283b", roundness: true }
  - rect: { id: sess1bar, at: [56, 234], size: [4, 54], bg: "#4263eb", stroke: "#4263eb" }
