# Ubiq — Screen 1: Projects / Launcher
# Manage projects, add a new project, and select the agent to run.
# Left: always-visible sidebar (Add session, sessions list, Settings).
# Center: grid of existing project cards.  Right: "New Project" form with agent picker.
# Render:  uv run _tools/excalidraw.py to-image -i 01-projects.excalidraw.yaml -o 01-projects.png --scale 2
version: 1

canvas:
  background: "#f1f3f5"
  theme: light

layout:
  mode: none

defaults:
  roughness: 0
  strokeWidth: thin
  fontFamily: normal

# Palette
#   accent #4263eb   ink #212529   label #495057   muted #868e96   placeholder #adb5bd
#   border #dee2e6   field #f8f9fa   card #ffffff
#   sidebar #1a1b26  sidebar-item #24283b  sidebar-text #c0caf5  sidebar-muted #565f89
#   agent tints: claude #edf2ff/#4263eb · codex #fff0f6/#e64980 · gemini #ebfbee/#2f9e44
#                opencode #f3f0ff/#7048e8 · copilot #fff4e6/#e8590c

elements:
  # =================================================== WINDOW CHROME
  - rect: win
    at: [20, 20]
    size: [1320, 840]
    bg: "#f1f3f5"
    stroke: "#ced4da"
    roundness: true
  - rect: titlebar
    at: [20, 20]
    size: [1320, 40]
    bg: "#e9ecef"
    stroke: "#ced4da"
    roundness: true
  - ellipse: { id: tl_r, at: [40, 34], size: [12, 12], bg: "#fa5252", stroke: "#fa5252" }
  - ellipse: { id: tl_y, at: [58, 34], size: [12, 12], bg: "#fab005", stroke: "#fab005" }
  - ellipse: { id: tl_g, at: [76, 34], size: [12, 12], bg: "#40c057", stroke: "#40c057" }
  - text: "● Ubiq   —   Projects"
    id: wintitle
    at: [600, 31]
    fontSize: 13
    align: left
    stroke: "#495057"

  # =================================================== SIDEBAR (always visible)
