# Ubiq — Screen 3: Subagents fan-out
# When the main agent spawns subagents, side panes appear for the others.
# Layout: large main pane (left) + stacked subagent panes (right).
# EVERY pane keeps the same TWO-ROW title (badge+workspace+status / folder·status).
# Render:  uv run _tools/excalidraw.py to-image -i 03-subagents.excalidraw.yaml -o 03-subagents.png --scale 2
version: 1

canvas:
  background: "#f1f3f5"
  theme: light

layout:
  mode: none

defaults:
  roughness: 0
  strokeWidth: thin
  fontFamily: normal

elements:
