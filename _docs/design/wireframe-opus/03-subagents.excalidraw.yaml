  - ellipse: { id: tl_r, at: [40, 34], size: [12, 12], bg: "#fa5252", stroke: "#fa5252" }
  - ellipse: { id: tl_y, at: [58, 34], size: [12, 12], bg: "#fab005", stroke: "#fab005" }
  - ellipse: { id: tl_g, at: [76, 34], size: [12, 12], bg: "#40c057", stroke: "#40c057" }
  - text: "● Ubiq   —   backend-refactor · 3 agents"
    id: wintitle
    at: [540, 31]
    fontSize: 13
    align: left
    stroke: "#495057"

