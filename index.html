<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>Ubiq — Harness Multiplexer</title>
  <script>(function(){var m=localStorage.getItem('ubiq-theme-mode'),t=localStorage.getItem('ubiq-theme');var e=m==='system'?(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'):(m||t||'dark');document.documentElement.dataset.theme=e==='light'?'light':'dark';})();</script>
  <link rel="stylesheet" href="/css/ubiq.css">
</head>
<body>
<div class="app">
  <div class="titlebar">
    <div class="traffic"><i class="r"></i><i class="y"></i><i class="g"></i></div>
    <div class="title-c"><b>Ubiq</b></div>
    <div class="win-actions">
      <button class="icon-btn" id="themeBtn" title="Toggle theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22M5 5l1.7 1.7M17.3 17.3 19 19M19 5l-1.7 1.7M6.7 17.3 5 19"/></svg>
      </button>
    </div>
  </div>

  <div class="body">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <span class="mark">◇</span><b>Ubiq</b><span class="ver" id="version">v0.1.0</span>
        <button class="collapse-btn" id="collapseBtn" title="Collapse sidebar" aria-label="Collapse sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M14 6l-6 6 6 6"/></svg>
        </button>
      </div>
      <div class="side-pad">
        <button class="btn primary full" id="new-session-btn" title="New session">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg><span class="lbl">New session</span>
        </button>
      </div>
      <div class="sec-label">Sessions</div>
      <div class="sessions" id="session-list"></div>
      <div class="sidebar-foot">
        <div class="spacer"></div>
      </div>
    </aside>

    <main class="main">
      <section class="view show" id="view-welcome">
        <div class="topbar"><div class="crumb"><span class="ses">Ubiq</span></div></div>
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px">
          <div style="text-align:center">
            <div style="width:56px;height:56px;border-radius:14px;background:linear-gradient(140deg,var(--accent),oklch(58% 0.2 300));display:grid;place-items:center;color:#fff;font-size:28px;margin:0 auto 16px;box-shadow:0 4px 20px var(--accent-soft)">◇</div>
            <h1 style="font-family:var(--display);font-size:22px;font-weight:680;letter-spacing:-.02em;margin:0 0 6px">Welcome to Ubiq</h1>
            <p style="color:var(--muted);font-size:13px;margin:0">Harness Multiplexer — run multiple AI agents side by side</p>
          </div>
          <button class="btn primary" id="welcome-new-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            Create your first session
          </button>
        </div>
      </section>

      <section class="view" id="view-session">
        <div class="topbar">
          <div class="crumb">
            <span class="ses" id="session-title"></span>
            <span class="sep" id="session-sep" style="display:none">/</span>
            <span class="pill run" id="session-status" style="display:none"><span class="dot run"></span>running</span>
          </div>
          <div class="spacer"></div>
          <span class="pill" id="agent-count" style="display:none">agent 0</span>
          <button class="btn sm primary" id="add-workspace-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> Add agent
          </button>
          <button class="btn sm" id="back-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M15 6l-6 6 6 6"/></svg> Back
          </button>
        </div>

        <div style="flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:12px" id="panes-container"></div>
      </section>
    </main>
  </div>
</div>

<div class="scrim" id="create-dialog">
  <div class="modal">
    <div class="mh"><h2>New Session</h2></div>
    <div class="mb">
      <div class="field">
        <label>Session Name</label>
        <input type="text" id="session-name" placeholder="my-project">
      </div>
      <div class="field">
        <label>Agent Type</label>
        <select class="sel" id="agent-type"></select>
      </div>
      <div class="field">
        <label>Home Folder (optional)</label>
        <input type="text" id="home-folder" placeholder="./_workspace">
      </div>
    </div>
    <div class="mf">
      <button class="btn" id="cancel-create">Cancel</button>
      <button class="btn primary" id="confirm-create">Create</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
<script src="/js/ubiq.js"></script>
<script type="module" src="/src/main.js"></script>
</body>
</html>
