<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ubiq — Harness Multiplexer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
        Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      background: #1e1e1e;
      color: #d4d4d4;
      height: 100vh;
      overflow: hidden;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      background: #2d2d2d;
      padding: 8px 16px;
      border-bottom: 1px solid #404040;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      font-size: 14px;
      font-weight: 500;
    }
    .controls {
      display: flex;
      gap: 8px;
    }
    .controls button {
      background: #0e639c;
      color: white;
      border: none;
      padding: 4px 12px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 12px;
    }
    .controls button:hover {
      background: #1177bb;
    }
    .panes-container {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      overflow: hidden;
    }
    .pane {
      flex: 1;
      min-width: 300px;
      min-height: 200px;
      border: 1px solid #404040;
      position: relative;
    }
    .pane-header {
      background: #333;
      padding: 4px 8px;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .pane-content {
      height: calc(100% - 24px);
      width: 100%;
    }
    .terminal {
      height: 100%;
      width: 100%;
    }
    .status-bar {
      background: #007acc;
      padding: 2px 8px;
      font-size: 11px;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>Ubiq — Harness Multiplexer</h1>
      <div class="controls">
        <button id="add-pane">+ Add Pane</button>
        <button id="remove-pane">- Remove Pane</button>
      </div>
    </header>
    <div class="panes-container" id="panes-container">
      <!-- Panes will be added here -->
    </div>
    <div class="status-bar">
      <span>Ready</span>
      <span>v0.1.0</span>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
